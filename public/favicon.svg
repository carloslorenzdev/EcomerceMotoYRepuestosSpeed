<svg viewBox="0 0 800 620" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="redGrad-fav" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stopColor="#ff1a1a" />
      <stop offset="50%" stopColor="#cc0000" />
      <stop offset="100%" stopColor="#660000" />
    </linearGradient>
    
    <linearGradient id="silverGrad-fav" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stopColor="#ffffff" />
      <stop offset="40%" stopColor="#b3b3b3" />
      <stop offset="50%" stopColor="#808080" />
      <stop offset="60%" stopColor="#cccccc" />
      <stop offset="100%" stopColor="#4d4d4d" />
    </linearGradient>

    <linearGradient id="blackGrad-fav" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stopColor="#1a1a1a" />
      <stop offset="100%" stopColor="#000000" />
    </linearGradient>

    <filter id="dropShadow-fav" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" floodColor="#000" floodOpacity="0.8"/>
    </filter>
    <filter id="textShadow-fav" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="3" floodColor="#000" floodOpacity="0.9"/>
    </filter>
  </defs>

  <!-- Outer Red Shield -->
  <path 
    d="M 50 180 L 400 120 L 750 180 L 750 300 Q 750 480 400 550 Q 50 480 50 300 Z" 
    fill="url(#redGrad-fav)" 
    stroke="#400000" 
    strokeWidth="4"
    filter="url(#dropShadow-fav)"
  />

  <!-- Silver Border -->
  <path 
    d="M 70 195 L 400 140 L 730 195 L 730 295 Q 730 460 400 520 Q 70 460 70 295 Z" 
    fill="url(#silverGrad-fav)" 
  />

  <!-- Inner Black Shield -->
  <path 
    d="M 85 210 L 400 160 L 715 210 L 715 290 Q 715 440 400 495 Q 85 440 85 290 Z" 
    fill="url(#blackGrad-fav)" 
  />

  <!-- 5 Stars -->
  <g fill="#ff1a1a" filter="url(#dropShadow-fav)">
    <path transform="translate(385, 175) scale(1.25)" d="M12 .587l3.668 7.568 8.332 1.151-6.064 5.828 1.48 8.279-7.416-3.967-7.417 3.967 1.481-8.279-6.064-5.828 8.332-1.151z" />
    <path transform="translate(340, 185) scale(1)" d="M12 .587l3.668 7.568 8.332 1.151-6.064 5.828 1.48 8.279-7.416-3.967-7.417 3.967 1.481-8.279-6.064-5.828 8.332-1.151z" />
    <path transform="translate(436, 185) scale(1)" d="M12 .587l3.668 7.568 8.332 1.151-6.064 5.828 1.48 8.279-7.416-3.967-7.417 3.967 1.481-8.279-6.064-5.828 8.332-1.151z" />
    <path transform="translate(300, 195) scale(0.8)" d="M12 .587l3.668 7.568 8.332 1.151-6.064 5.828 1.48 8.279-7.416-3.967-7.417 3.967 1.481-8.279-6.064-5.828 8.332-1.151z" />
    <path transform="translate(480, 195) scale(0.8)" d="M12 .587l3.668 7.568 8.332 1.151-6.064 5.828 1.48 8.279-7.416-3.967-7.417 3.967 1.481-8.279-6.064-5.828 8.332-1.151z" />
  </g>

  <!-- SPEED Text -->
  <g transform="translate(400, 340)" filter="url(#textShadow-fav)">
    <text 
      x="0" 
      y="0" 
      textAnchor="middle" 
      fontFamily="Arial Black, Impact, sans-serif" 
      fontSize="140" 
      fontWeight="900" 
      fill="url(#silverGrad-fav)" 
      stroke="#1a1a1a" 
      strokeWidth="3" 
      letterSpacing="8"
      transform="scale(1.3, 1)"
    >
      SPEED
    </text>
  </g>

  <!-- Dirt Bike Silhouette -->
  <g transform="translate(325, 360) scale(3)" fill="#ff1a1a" filter="url(#dropShadow-fav)">
    <circle cx="12" cy="24" r="5" fill="none" stroke="#ff1a1a" strokeWidth="2.5"/>
    <circle cx="38" cy="24" r="5" fill="none" stroke="#ff1a1a" strokeWidth="2.5"/>
    <path d="M 12 24 L 20 14 L 32 14 L 38 24 M 20 14 L 25 4 L 30 4 M 32 14 L 25 4 L 15 12" stroke="#ff1a1a" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" fill="none"/>
    <path d="M 15 12 C 22 10 28 10 34 14 L 35 16 L 16 16 Z" fill="#ff1a1a"/>
    <path d="M 30 4 L 35 1" stroke="#ff1a1a" strokeWidth="2" strokeLinecap="round"/>
    <path d="M 35 16 Q 40 16 45 20" stroke="#ff1a1a" strokeWidth="2" fill="none" strokeLinecap="round"/>
    <path d="M 16 16 Q 10 16 5 20" stroke="#ff1a1a" strokeWidth="2" fill="none" strokeLinecap="round"/>
  </g>
</svg>
